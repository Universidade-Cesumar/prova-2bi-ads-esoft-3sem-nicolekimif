<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque - Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Cadastro de Materiais (Almoxarifado)</h2>
    
    <form id="form-cadastro">
        <div>
            <label for="input-nome">Nome do Material:</label>
            <input type="text" id="input-nome" required placeholder="Ex: Seringa, Gaze...">
        </div>
        <div>
            <label for="input-quantidade">Quantidade:</label>
            <input type="number" id="input-quantidade" required min="1" placeholder="Ex: 100">
        </div>
        <button type="submit" id="btn-cadastrar">Cadastrar</button>
    </form>

    <h2>Dashboard e Consulta</h2>
    <div class="dashboard-controles">
        <input type="text" id="input-busca" placeholder="Pesquisar material pelo nome...">
    </div>

    <h2>Lista de Materiais</h2>
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Estoque Atual</th>
                <th>Qtd. a Retirar</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="lista-materiais">
            </tbody>
    </table>

    <script src="main.js"></script>
</body>
</html>
